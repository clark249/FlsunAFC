#####################################################################################################################################


[mcu]                                   # Main MCU configuration
#serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_slipper-if00  # Serial port setting, this line is commented out
#serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_slipper-if00  # Serial port setting, this line is commented out
canbus_uuid: 6cc8d04b4f5a               # CAN bus UUID
canbus_interface: can0                  # CAN bus interface

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
# canbus_uuid: 4b3bf383621f
canbus_uuid: 2a657d013c2a
[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

##################################################################################################################################### 
#                    _______ _______ _______  _____  _______  ______ _______ _______ _     _  ______ _______
#                       |    |______ |  |  | |_____] |______ |_____/ |_____|    |    |     | |_____/ |______
#                       |    |______ |  |  | |       |______ |    \_ |     |    |    |_____| |    \_ |______ 
#
##################################################################################################################################### 

[temperature_sensor Motherboard]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

##################################################################################################################################### 
#                          _____   ______ _____ __   _ _______ _______  ______
#                         |_____] |_____/   |   | \  |    |    |______ |_____/
#                         |       |    \_ __|__ |  \_|    |    |______ |    \_                          
#
##################################################################################################################################### 

[printer]
kinematics: delta
max_velocity: 400 #max print speed ,default is 400mm/s
max_accel: 8000 
# max_accel_to_decel: 5000  
square_corner_velocity: 5 
max_z_velocity: 400 
#delta_radius: 161.75 # delta radius,default is 161.75
print_radius: 152 #max printable radius 150,set it to 152 to avoid error "out of range"
minimum_z_position=-30 #min z position nozzle won't go to the position which Z lower the vaule

##################################################################################################################################### 
#                             _______ _     _ _______  ______ _     _ ______  _______  ______
#                             |______  \___/     |    |_____/ |     | |     \ |______ |_____/
#                             |______ _/   \_    |    |    \_ |_____| |_____/ |______ |    \_                    
#
#####################################################################################################################################

[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.673
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
min_extrude_temp: 180                # Minimum extrude temperature
pressure_advance: 0.025 #to be calibrated
pressure_advance_smooth_time: 0.03 #to be calibrated
heater_pin: EBBCan: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
control = pid
pid_kp = 25.928
pid_ki = 2.216
pid_kd = 75.838
min_temp: -199
max_temp: 300

[tmc2209 extruder]
uart_pin: EBBCan: PA15
interpolate: true
run_current: 0.85 #**
hold_current: 0.100
sense_resistor: 0.11 #**
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

##################################################################################################################################### 
#                               _______ _______ __   _ _______
#                               |______ |_____| | \  | |______
#                               |       |     | |  \_| ______|                 
#
#####################################################################################################################################


[fan]
pin: EBBCan: PA1

[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50.0


##################################################################################################################################### 
#                              _     _ _______ _______ _______ _______ ______       ______  _______ ______
#                              |_____| |______ |_____|    |    |______ |     \      |_____] |______ |     \
#                              |     | |______ |     |    |    |______ |_____/      |_____] |______ |_____/                  
#
#####################################################################################################################################

[heater_bed]
heater_pin: PF5                        # (BE0) Heater pin
sensor_pin: PB1 
sensor_type: EPCOS 100K B57560G104F
min_temp: -5
max_temp: 120
control = pid
pid_kp = 72.403
pid_ki = 2.277
pid_kd = 575.604




[endstop_phase]

[probe]

pin: !EBBCan:PB6
x_offset: 0
y_offset: 0
#z_offset = 0
speed: 10
lift_speed: 50
samples: 3
samples_result: average
sample_retract_dist: 6
samples_tolerance: 0.1
samples_tolerance_retries: 5

#[neopixel hotend_rgb]
#pin: EBBCan:PD3

#[bltouch]
#sensor_pin: ^EBBCan:PB8
#control_pin: EBBCan:PB9

#[filament_switch_sensor switch_sensor]
#switch_pin: EBBCan:PB4

#[filament_motion_sensor motion_sensor]
#switch_pin: ^EBBCan:PB3



########################################
# Y Stepper Motor & Driver Settings
########################################

[stepper_a] # Using Motor 7
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16 
rotation_distance: 40 #rotation_distance = <full_steps_per_rotation> * <microsteps> / <steps_per_mm>, 
endstop_pin: ^PF4
#position_endstop: 415 # printer printable height
homing_speed: 40 
#arm_length = 345 

[tmc2209 stepper_a]
uart_pin: PC13
run_current: 1
#interpolate: False
stealthchop_threshold: 0



[stepper_b]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF3
#position_endstop: 415
#arm_length = 345

[tmc2209 stepper_b]
uart_pin: PE3
run_current: 1
#hold_current: 0.500 # motor hold current
stealthchop_threshold: 0

[stepper_c]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF2
#position_endstop: 415
#arm_length = 345

[tmc2209 stepper_c]
uart_pin: PB9
run_current: 1
#hold_current: 0.500 # motor hold current
stealthchop_threshold: 0



########################################
# Firmware Retraction Settings
########################################

[firmware_retraction]
retract_length: 0.7
retract_speed: 40
unretract_extra_length: 0.05
unretract_speed: 40

########################################
# Input Shaper Settings
########################################

[input_shaper]
shaper_freq_x: 38.6
shaper_type_x = mzv
shaper_freq_y: 45
shaper_type_y = ei



################################################################################################################
#calibrate and bed_mesh
################################################################################################################
[delta_calibrate]
radius: 148
horizontal_move_z: 30 #This value is related to the lift height of the nozzle during delta_calibrate
Speed: 100


[bed_mesh]  
speed: 50 
horizontal_move_z: 23 #This value is related to the lift height of the nozzle during bed_mesh
mesh_radius: 148  
mesh_origin: 0,0  
round_probe_count: 9 # 7*7
algorithm: bicubic

#############################################################################################################
#GCODE
#############################################################################################################
[gcode_macro led_on]
gcode:
  SET_PIN PIN=LED_pin VALUE=1

[gcode_macro led_off]
gcode:
  SET_PIN PIN=LED_pin VALUE=0


[gcode_macro ZUP]
gcode:
    SET_GCODE_OFFSET Z_ADJUST=0.025 MOVE=1

[gcode_macro ZDOWN]
gcode:
   SET_GCODE_OFFSET Z_ADJUST=-0.025 MOVE=1

[gcode_macro bed_level_1]
gcode:
  SET_GCODE_OFFSET Z=0
  G28
  delta_calibrate
  G1 X0 Y0 Z50 F4200
  G28
  save_config

[gcode_macro bed_level_2]
gcode:
  G28
  G1 X0 Y0 Z50 F4200
  bed_mesh_calibrate
  G1 X0 Y0 Z50 F4200
  G28
  save_config

[gcode_macro UNLOAD_FILAMENT] #unload filament
gcode:
    G91
#    G1 E10 F300
    G1 E-100 F800
    G90

[gcode_macro LOAD_FILAMENT] #load filament
gcode:
    G91
    G1 E50 F800
    G1 E30 F300
    G90
    
[gcode_macro M600]
gcode:
  PAUSE
  
[gcode_macro TMC]
gcode:
  DUMP_TMC STEPPER=stepper_a
  DUMP_TMC STEPPER=stepper_b
  DUMP_TMC STEPPER=stepper_c
  DUMP_TMC STEPPER=extruder
  

[gcode_macro save_time]
gcode:
    {% if printer.save_variables.variables.total_time %}
        {% set print_time = printer.save_variables.variables.total_time %}
    {% else %} 
        {% set print_time = 0 %}
    {% endif %}
    {% set print_time = print_time + printer.print_stats.print_duration/3600 %}
    SAVE_VARIABLE VARIABLE=total_time VALUE={print_time}

[gcode_macro SET_GCODE_OFFSET]  
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %} 
        {% set offsets = {'x': None,'y': None,'z': None} %}
    {% endif %}
    
    {% set ns = namespace(offsets={'x': offsets.x,'y': offsets.y,'z': offsets.z}) %}
    
    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {%if 'X' in params %}{% set null = ns.offsets.update({'x': params.X}) %}{% endif %}
    {%if 'Y' in params %}{% set null = ns.offsets.update({'y': params.Y}) %}{% endif %}
    {%if 'Z' in params %}{% set null = ns.offsets.update({'z': params.Z}) %}{% endif %}
    {%if 'Z_ADJUST' in params %}
        {%if ns.offsets.z == None %}{% set null = ns.offsets.update({'z': 0}) %}{% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"

[delayed_gcode LOAD_GCODE_OFFSETS]
initial_duration: 2
gcode:  
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}

        _SET_GCODE_OFFSET {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %}

        { action_respond_info("Loaded gcode offsets from saved variables [%s]" % (offsets)) }
    {% endif %}|

[idle_timeout]
gcode:
#   A list of G-Code commands to execute on an idle timeout. See
#   docs/Command_Templates.md for G-Code format. The default is to run
#   "TURN_OFF_HEATERS" and "M84".
timeout: 172800
#   Idle time (in seconds) to wait before running the above G-Code
#   commands. The default is 600 seconds.



